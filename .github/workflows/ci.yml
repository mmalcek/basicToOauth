name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          check-latest: true

      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::gofmt needed on:"; echo "$out"; exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race ./...

      - name: build
        env:
          CGO_ENABLED: "0"
        run: go build ./...
